baseURL: "https://blog.epimethean.dev/"
title: "Epimethean Challenge"
languageCode: "en-us"

module:
  imports:
    - path: github.com/imfing/hextra

enableGitInfo: true

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - ['\[', '\]']
            - ['$$', '$$']
          inline:
            - ['\(', '\)']
        enable: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  discord_url: "https://discord.com/invite/YAAfPDPfdp"
  blog:
    list:
      displayedSection: ""
      sortBy: date
      sortOrder: desc
  navbar:
    displayTitle: true
    displayLogo: false
  sidebar:
    autoCollapse: true

menu:
  main:
    - identifier: blog
      name: Blog
      url: /
      weight: 40
